<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Field Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── GPS BANNER ── */
  #banner{background:#0f0f1e;border-bottom:1px solid #333;padding:10px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-height:52px}
  #gps-dot{width:10px;height:10px;border-radius:50%;background:#888;flex-shrink:0;transition:background .3s}
  #gps-dot.good{background:#22c55e;box-shadow:0 0 6px #22c55e88}
  #gps-dot.ok{background:#f59e0b}
  #gps-dot.bad{background:#ef4444}
  #banner-coords{font-size:13px;font-family:monospace;color:#a3e635;flex:1;min-width:200px}
  #banner-meta{font-size:11px;color:#888;display:flex;gap:14px;flex-wrap:wrap}
  #banner-meta span{white-space:nowrap}
  .acc-good{color:#22c55e}
  .acc-ok{color:#f59e0b}
  .acc-bad{color:#ef4444}

  /* ── TOOLBAR ── */
  #toolbar{background:#0f1b2d;border-bottom:1px solid #1e3a5f;padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  button{padding:6px 14px;border-radius:6px;border:1px solid #2a4a6b;background:#1a2f4a;color:#90caf9;font-size:13px;cursor:pointer;transition:background .15s}
  button:hover{background:#1e3f64}
  button.danger{border-color:#4a1a1a;background:#2a1010;color:#f87171}
  button.danger:hover{background:#3a1515}
  button.active{background:#1565c0;border-color:#1976d2;color:#fff}
  button.submit-btn{background:#155724;border-color:#1e6e38;color:#90ee90;font-weight:600}
  button.submit-btn:hover{background:#1a6e2e}
  button.submit-btn.loading{opacity:.6;cursor:not-allowed}
  #settings-btn{margin-left:auto}
  #status-msg{font-size:12px;color:#888;padding:0 4px}

  /* ── MAP ── */
  #map{flex:1;z-index:1}

  /* ── SETTINGS PANEL ── */
  #settings-panel{position:absolute;top:0;right:0;width:320px;height:100%;background:#0f1b2d;border-left:1px solid #1e3a5f;z-index:1000;display:none;flex-direction:column;overflow-y:auto}
  #settings-panel.open{display:flex}
  #settings-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #1e3a5f}
  #settings-header h2{font-size:15px;font-weight:600;color:#90caf9}
  #close-settings{background:none;border:none;color:#888;font-size:20px;cursor:pointer;padding:0 4px}
  #close-settings:hover{color:#fff}
  .settings-body{padding:16px;display:flex;flex-direction:column;gap:16px}
  .field-group{display:flex;flex-direction:column;gap:5px}
  .field-group label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.05em}
  .field-group input,.field-group textarea,.field-group select{background:#0a121f;border:1px solid #1e3a5f;border-radius:6px;color:#e0e0e0;padding:8px 10px;font-size:14px;width:100%}
  .field-group input:focus,.field-group textarea:focus{outline:none;border-color:#1976d2}
  .field-group textarea{resize:vertical;min-height:70px;font-family:system-ui}
  .settings-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#1976d2;margin-top:4px}
  .save-row{display:flex;justify-content:flex-end;margin-top:8px}
  .save-row button{background:#155724;border-color:#1e6e38;color:#90ee90}
  .save-row button:hover{background:#1a6e2e}

  /* ── TOAST ── */
  #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e3a1e;color:#90ee90;border:1px solid #2e6e2e;padding:10px 20px;border-radius:8px;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
  #toast.error{background:#3a1e1e;color:#f87171;border-color:#6e2e2e}
  #toast.show{opacity:1}

  /* ── LEAFLET overrides ── */
  .leaflet-control-attribution{font-size:10px}
  .loc-marker-inner{width:14px;height:14px;border-radius:50%;background:#3b82f6;border:2px solid #fff;box-shadow:0 0 8px #3b82f688}
  .loc-pulse{width:40px;height:40px;border-radius:50%;background:#3b82f622;border:1px solid #3b82f655;position:absolute;top:-13px;left:-13px;animation:pulse 2s infinite}
  @keyframes pulse{0%{transform:scale(.5);opacity:1}100%{transform:scale(2);opacity:0}}
  .track-marker{width:10px;height:10px;border-radius:50%;background:#f59e0b55;border:1px solid #f59e0b;box-shadow:0 0 4px #f59e0b44}

  /* ── TRACK INFO ── */
  #track-info{position:absolute;bottom:10px;left:10px;z-index:500;background:#0f1b2dcc;backdrop-filter:blur(4px);border:1px solid #1e3a5f;border-radius:8px;padding:8px 12px;font-size:12px;color:#90caf9;display:none}
  #track-info.visible{display:block}
</style>
</head>
<body>

<!-- GPS BANNER -->
<div id="banner">
  <div id="gps-dot"></div>
  <div id="banner-coords">Acquiring GPS...</div>
  <div id="banner-meta">
    <span id="meta-acc">Acc: —</span>
    <span id="meta-alt">Alt: —</span>
    <span id="meta-spd">Spd: —</span>
    <span id="meta-hdg">Hdg: —</span>
    <span id="meta-time">—</span>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="submit-btn" id="submit-btn" onclick="submitLocation()">Submit Location</button>
  <button id="track-btn" onclick="toggleTracking()">Live Track</button>
  <button id="center-btn" onclick="centerMap()">Center</button>
  <button class="danger" id="clear-btn" onclick="clearTrack()">Clear Track</button>
  <span id="status-msg">Ready</span>
  <button id="settings-btn" onclick="openSettings()">Settings</button>
</div>

<!-- MAP -->
<div id="map"></div>
<div id="track-info">
  <span id="track-pts">0 pts</span> &nbsp;|&nbsp; <span id="track-dist">0.0 mi</span>
</div>

<!-- SETTINGS PANEL -->
<div id="settings-panel">
  <div id="settings-header">
    <h2>Responder Settings</h2>
    <button id="close-settings" onclick="closeSettings()">✕</button>
  </div>
  <div class="settings-body">
    <div class="settings-section-title">Identity</div>
    <div class="field-group">
      <label>Name</label>
      <input type="text" id="s-name" placeholder="Full name"/>
    </div>
    <div class="field-group">
      <label>Agency</label>
      <input type="text" id="s-agency" placeholder="e.g. TEMA, Hamilton Co EMA"/>
    </div>
    <div class="field-group">
      <label>Region</label>
      <input type="text" id="s-region" placeholder="e.g. West TN"/>
    </div>
    <div class="field-group">
      <label>Car Number</label>
      <input type="text" id="s-car" placeholder="e.g. ESC-7"/>
    </div>
    <div class="field-group">
      <label>Assigned</label>
      <input type="text" id="s-assigned" placeholder="Current assignment or mission"/>
    </div>
    <div class="settings-section-title" style="margin-top:4px">Feature Service</div>
    <div class="field-group">
      <label>ArcGIS Feature Service URL</label>
      <input type="text" id="s-fsurl" placeholder="https://.../FeatureServer/0"/>
    </div>
    <div class="field-group">
      <label>Token (optional)</label>
      <input type="text" id="s-token" placeholder="ArcGIS token or leave blank"/>
    </div>
    <div class="settings-section-title" style="margin-top:4px">Notes</div>
    <div class="field-group">
      <label>Notes</label>
      <textarea id="s-notes" placeholder="Mission notes, assignment, etc."></textarea>
    </div>
    <div class="settings-section-title" style="margin-top:4px">Tracking</div>
    <div class="field-group">
      <label>Auto-submit interval (seconds)</label>
      <input type="number" id="s-interval" value="30" min="5" max="300"/>
    </div>
    <div class="field-group">
      <label>Min distance filter (meters)</label>
      <input type="number" id="s-mindist" value="10" min="0" max="500"/>
    </div>
    <div class="save-row">
      <button onclick="saveSettings()">Save Settings</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const DEMO_MODE = false;

let map, locMarker, trackLine, watchId=null, isTracking=false;
let lastPos=null, trackCoords=[], trackPoints=[], autoInterval=null;
let cfg = {name:'',agency:'',region:'',car:'',assigned:'',notes:'',fsurl:'https://services8.arcgis.com/hHiNEOyFVAr0vW21/arcgis/rest/services/service_0fc5bb1784aa47fa8c9a0e1b3bf6e425/FeatureServer/0',token:'',interval:30,mindist:10};

// ── INIT MAP ──────────────────────────────────────────────
function initMap(){
  map = L.map('map',{zoomControl:true}).setView([35.8,-86.4],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19
  }).addTo(map);
  // alt: ESRI satellite
  // L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'ESRI'}).addTo(map);
  loadCfg();
  startWatch();
}

// ── GPS WATCH ─────────────────────────────────────────────
function startWatch(){
  if(!navigator.geolocation){showToast('Geolocation not supported','error');return}
  watchId = navigator.geolocation.watchPosition(onPos, onErr, {
    enableHighAccuracy:true,maximumAge:5000,timeout:15000
  });
}

function onPos(pos){
  const {latitude:lat,longitude:lng,accuracy:acc,altitude:alt,speed:spd,heading:hdg} = pos.coords;
  lastPos = pos;
  updateBanner(lat,lng,acc,alt,spd,hdg,pos.timestamp);
  updateMarker(lat,lng,acc);
  if(isTracking) recordTrackPoint(lat,lng,pos.timestamp);
}

function onErr(e){
  document.getElementById('banner-coords').textContent='GPS error: '+e.message;
  document.getElementById('gps-dot').className='bad';
}

function updateBanner(lat,lng,acc,alt,spd,hdg,ts){
  const dot = document.getElementById('gps-dot');
  dot.className = acc<10?'good':acc<30?'ok':'bad';
  const accCls = acc<10?'acc-good':acc<30?'acc-ok':'acc-bad';
  document.getElementById('banner-coords').textContent =
    `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
  document.getElementById('meta-acc').innerHTML =
    `Acc: <span class="${accCls}">±${Math.round(acc)}m</span>`;
  document.getElementById('meta-alt').textContent =
    alt!=null?`Alt: ${Math.round(alt)}m`:'Alt: —';
  document.getElementById('meta-spd').textContent =
    spd!=null?`Spd: ${(spd*2.237).toFixed(1)}mph`:'Spd: —';
  document.getElementById('meta-hdg').textContent =
    hdg!=null?`Hdg: ${Math.round(hdg)}°`:'Hdg: —';
  document.getElementById('meta-time').textContent =
    new Date(ts).toLocaleTimeString();
}

// ── MAP MARKER ────────────────────────────────────────────
function updateMarker(lat,lng,acc){
  if(!locMarker){
    const icon = L.divIcon({
      className:'',
      html:'<div style="position:relative"><div class="loc-pulse"></div><div class="loc-marker-inner"></div></div>',
      iconSize:[14,14],iconAnchor:[7,7]
    });
    locMarker = L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
    if(acc>0) locMarker.accCircle = L.circle([lat,lng],{radius:acc,color:'#3b82f6',fillOpacity:.08,weight:1}).addTo(map);
    map.setView([lat,lng],14);
  } else {
    locMarker.setLatLng([lat,lng]);
    if(locMarker.accCircle){locMarker.accCircle.setLatLng([lat,lng]);locMarker.accCircle.setRadius(acc)}
  }
}

// ── SUBMIT ────────────────────────────────────────────────
async function submitLocation(){
  if(!lastPos){showToast('No GPS fix yet','error');return}
  const btn = document.getElementById('submit-btn');
  btn.classList.add('loading');btn.disabled=true;
  setStatus('Submitting...');
  const {latitude:lat,longitude:lng,accuracy:acc,altitude:alt,speed:spd,heading:hdg}=lastPos.coords;
  const attr = {
    name: cfg.name||'Unknown',
    car_number: cfg.car||'',
    agency: cfg.agency||'',
    region: cfg.region||'',
    assigned: cfg.assigned||'',
    notes: cfg.notes||'',
    photo: '',
    latitude: lat,
    longitude: lng,
    timestamp_utc: new Date(lastPos.timestamp).toISOString(),
    speed_mph: spd!=null?parseFloat((spd*2.237).toFixed(1)):null,
    heading: hdg!=null?Math.round(hdg):null
  };
  let ok=false;
  if(!cfg.fsurl||DEMO_MODE){
    await new Promise(r=>setTimeout(r,600));
    ok=true;
    console.log('[DEMO] Feature attributes:',attr);
    addMapSubmitPin(lat,lng,attr);
  } else {
    ok = await postToFS(lat,lng,attr);
  }
  btn.classList.remove('loading');btn.disabled=false;
  if(ok){showToast(`Submitted: ${lat.toFixed(5)}, ${lng.toFixed(5)}`);setStatus('Last submit: '+new Date().toLocaleTimeString())}
  else{showToast('Submission failed','error');setStatus('Submit failed')}
}

async function postToFS(lat,lng,attr){
  try{
    const feat={geometry:{x:lng,y:lat,spatialReference:{wkid:4326}},attributes:attr};
    const params=new URLSearchParams();
    params.append('features',JSON.stringify([feat]));
    params.append('f','json');
    if(cfg.token) params.append('token',cfg.token);
    const r=await fetch(`${cfg.fsurl}/addFeatures`,{method:'POST',body:params});
    const j=await r.json();
    return j.addResults&&j.addResults[0]&&j.addResults[0].success;
  }catch(e){console.error(e);return false}
}

function addMapSubmitPin(lat,lng,attr){
  const icon=L.divIcon({
    className:'',
    html:`<div style="background:#22c55e;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 6px #22c55e88"></div>`,
    iconSize:[12,12],iconAnchor:[6,6]
  });
  const m=L.marker([lat,lng],{icon}).addTo(map);
  const time=new Date(attr.timestamp_utc).toLocaleTimeString();
  m.bindPopup(`<b>${attr.name}</b>${attr.car_number?' · '+attr.car_number:''}<br>${attr.agency?attr.agency+'<br>':''}${attr.assigned?'<i>'+attr.assigned+'</i><br>':''}${lat.toFixed(5)}, ${lng.toFixed(5)}<br>${time}${attr.notes?'<br>'+attr.notes:''}`);
}

// ── LIVE TRACKING ─────────────────────────────────────────
function toggleTracking(){
  isTracking=!isTracking;
  const btn=document.getElementById('track-btn');
  const info=document.getElementById('track-info');
  if(isTracking){
    btn.textContent='Stop Track';btn.classList.add('active');
    info.classList.add('visible');
    setStatus('Tracking ON');
    if(cfg.fsurl&&!DEMO_MODE){
      autoInterval=setInterval(()=>{if(lastPos)submitLocation()},cfg.interval*1000);
    }
  }else{
    btn.textContent='Live Track';btn.classList.remove('active');
    clearInterval(autoInterval);autoInterval=null;
    setStatus('Tracking OFF');
  }
}

function recordTrackPoint(lat,lng,ts){
  if(trackCoords.length>0){
    const last=trackCoords[trackCoords.length-1];
    const dist=haversine(last[0],last[1],lat,lng);
    if(dist<cfg.mindist) return;
  }
  trackCoords.push([lat,lng]);
  trackPoints.push({lat,lng,ts});
  if(trackLine) map.removeLayer(trackLine);
  if(trackCoords.length>1){
    trackLine=L.polyline(trackCoords,{color:'#f59e0b',weight:3,opacity:.8,dashArray:'6,4'}).addTo(map);
  }
  const totalDist=calcTotalDist();
  document.getElementById('track-pts').textContent=`${trackCoords.length} pts`;
  document.getElementById('track-dist').textContent=`${totalDist.toFixed(1)} mi`;
}

function calcTotalDist(){
  let d=0;
  for(let i=1;i<trackCoords.length;i++){
    d+=haversine(trackCoords[i-1][0],trackCoords[i-1][1],trackCoords[i][0],trackCoords[i][1]);
  }
  return d/1609.34;
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371000,r=Math.PI/180;
  const dLat=(lat2-lat1)*r,dLon=(lon2-lon1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function clearTrack(){
  trackCoords=[];trackPoints=[];
  if(trackLine){map.removeLayer(trackLine);trackLine=null}
  document.getElementById('track-pts').textContent='0 pts';
  document.getElementById('track-dist').textContent='0.0 mi';
  setStatus('Track cleared');
}

// ── SETTINGS ─────────────────────────────────────────────
function openSettings(){document.getElementById('settings-panel').classList.add('open')}
function closeSettings(){document.getElementById('settings-panel').classList.remove('open')}

function loadCfg(){
  const saved=localStorage.getItem('fieldtracker_cfg');
  if(saved){cfg=Object.assign(cfg,JSON.parse(saved))}
  document.getElementById('s-name').value=cfg.name;
  document.getElementById('s-agency').value=cfg.agency;
  document.getElementById('s-region').value=cfg.region;
  document.getElementById('s-car').value=cfg.car;
  document.getElementById('s-assigned').value=cfg.assigned;
  document.getElementById('s-notes').value=cfg.notes;
  document.getElementById('s-fsurl').value=cfg.fsurl;
  document.getElementById('s-token').value=cfg.token;
  document.getElementById('s-interval').value=cfg.interval;
  document.getElementById('s-mindist').value=cfg.mindist;
}

function saveSettings(){
  cfg.name=document.getElementById('s-name').value.trim();
  cfg.agency=document.getElementById('s-agency').value.trim();
  cfg.region=document.getElementById('s-region').value.trim();
  cfg.car=document.getElementById('s-car').value.trim();
  cfg.assigned=document.getElementById('s-assigned').value.trim();
  cfg.notes=document.getElementById('s-notes').value.trim();
  cfg.fsurl=document.getElementById('s-fsurl').value.trim().replace(/\/$/,'');
  cfg.token=document.getElementById('s-token').value.trim();
  cfg.interval=parseInt(document.getElementById('s-interval').value)||30;
  cfg.mindist=parseInt(document.getElementById('s-mindist').value)||10;
  localStorage.setItem('fieldtracker_cfg',JSON.stringify(cfg));
  closeSettings();
  showToast('Settings saved');
}

// ── UTILS ─────────────────────────────────────────────────
function centerMap(){if(lastPos){map.setView([lastPos.coords.latitude,lastPos.coords.longitude],16)}}
function setStatus(msg){document.getElementById('status-msg').textContent=msg}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ── START ─────────────────────────────────────────────────
window.addEventListener('load',initMap);
</script>
</body>
</html>
