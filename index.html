<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Field Tracker</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#0d1117;color:#e0e0e0}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* BANNER */
#banner{background:#0f0f1e;border-bottom:1px solid #1e3a5f;padding:8px 12px;flex-shrink:0}
#banner-row1{display:flex;align-items:center;gap:8px;margin-bottom:3px}
#gps-dot{width:10px;height:10px;border-radius:50%;background:#555;flex-shrink:0;transition:background .3s}
#gps-dot.good{background:#22c55e;box-shadow:0 0 6px #22c55e88}
#gps-dot.ok{background:#f59e0b;box-shadow:0 0 6px #f59e0b88}
#gps-dot.bad{background:#ef4444}
#banner-coords{font-size:13px;font-family:monospace;color:#a3e635;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#banner-row2{display:flex;gap:10px;flex-wrap:wrap}
.bmeta{font-size:11px;color:#666;white-space:nowrap}
.bmeta span{color:#aaa}
.acc-good{color:#22c55e!important}
.acc-ok{color:#f59e0b!important}
.acc-bad{color:#ef4444!important}

/* TOOLBAR */
#toolbar{background:#0a1628;border-bottom:1px solid #1e3a5f;padding:6px 8px;display:flex;gap:6px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.tb-btn{padding:7px 12px;border-radius:7px;border:1px solid #1e3a5f;background:#0f1e33;color:#90caf9;font-size:13px;cursor:pointer;white-space:nowrap;touch-action:manipulation;min-height:36px}
.tb-btn:active{opacity:.75}
.tb-btn.active{background:#1565c0;border-color:#2196f3;color:#fff}
.tb-btn.green{background:#14532d;border-color:#16a34a;color:#86efac;font-weight:600}
.tb-btn.red{background:#450a0a;border-color:#dc2626;color:#fca5a5}
#status-msg{font-size:11px;color:#666;flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:2px}

/* MAP */
#map{flex:1;min-height:0;z-index:1}

/* TRACK INFO */
#track-info{position:absolute;bottom:14px;left:10px;z-index:500;background:#0f1b2dee;border:1px solid #1e3a5f;border-radius:8px;padding:6px 10px;font-size:12px;color:#90caf9;display:none;pointer-events:none}
#track-info.vis{display:block}

/* SETTINGS DRAWER */
#overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:900;touch-action:none}
#overlay.open{display:block}
#drawer{position:fixed;top:0;right:-100%;width:min(320px,100vw);height:100%;background:#0a121f;border-left:1px solid #1e3a5f;z-index:1000;display:flex;flex-direction:column;transition:right .25s ease;overflow:hidden}
#drawer.open{right:0}
#drawer-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-bottom:1px solid #1e3a5f;flex-shrink:0}
#drawer-head h2{font-size:15px;font-weight:600;color:#90caf9}
#close-btn{background:none;border:none;color:#888;font-size:22px;cursor:pointer;padding:0 4px;line-height:1;touch-action:manipulation}
#close-btn:active{color:#fff}
#drawer-body{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px;-webkit-overflow-scrolling:touch}
.sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#1976d2;margin-top:2px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg textarea,.fg select{background:#060d18;border:1px solid #1e3a5f;border-radius:6px;color:#e0e0e0;padding:9px 10px;font-size:15px;width:100%;-webkit-appearance:none}
.fg input:focus,.fg textarea:focus{outline:none;border-color:#1976d2}
.fg textarea{resize:vertical;min-height:65px;font-family:inherit}
.save-btn{width:100%;padding:10px;border-radius:8px;background:#14532d;border:1px solid #16a34a;color:#86efac;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;min-height:44px;touch-action:manipulation}
.save-btn:active{opacity:.8}

/* TOAST */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#14532d;color:#86efac;border:1px solid #16a34a;padding:10px 18px;border-radius:10px;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center}
#toast.err{background:#450a0a;color:#fca5a5;border-color:#dc2626}
#toast.show{opacity:1}

/* LEAFLET */
.leaflet-control-zoom a{min-height:30px;min-width:30px;line-height:30px}
.my-dot{width:14px;height:14px;border-radius:50%;background:#3b82f6;border:2.5px solid #fff;box-shadow:0 0 0 3px #3b82f644}
.pulse-ring{width:40px;height:40px;border-radius:50%;background:#3b82f618;border:1.5px solid #3b82f655;position:absolute;top:-13px;left:-13px;animation:pulse 2s infinite ease-out}
@keyframes pulse{0%{transform:scale(.5);opacity:1}100%{transform:scale(2.2);opacity:0}}
</style>
</head>
<body>
<div id="app">

  <!-- BANNER -->
  <div id="banner">
    <div id="banner-row1">
      <div id="gps-dot"></div>
      <div id="banner-coords">Acquiring GPS…</div>
    </div>
    <div id="banner-row2">
      <div class="bmeta">Acc: <span id="m-acc">—</span></div>
      <div class="bmeta">Alt: <span id="m-alt">—</span></div>
      <div class="bmeta">Spd: <span id="m-spd">—</span></div>
      <div class="bmeta">Hdg: <span id="m-hdg">—</span></div>
      <div class="bmeta"><span id="m-time">—</span></div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button class="tb-btn green" id="submit-btn" onclick="submitLoc()">Submit</button>
    <button class="tb-btn" id="track-btn" onclick="toggleTrack()">Live Track</button>
    <button class="tb-btn" id="center-btn" onclick="centerMap()">Center</button>
    <button class="tb-btn red" onclick="clearTrack()">Clear</button>
    <span id="status-msg">Ready</span>
    <button class="tb-btn" onclick="openDrawer()">&#9881;</button>
  </div>

  <!-- MAP -->
  <div id="map"></div>
  <div id="track-info"><span id="ti-pts">0 pts</span> &nbsp;·&nbsp; <span id="ti-dist">0.0 mi</span></div>

</div>

<!-- SETTINGS DRAWER -->
<div id="overlay" onclick="closeDrawer()"></div>
<div id="drawer">
  <div id="drawer-head">
    <h2>Responder Settings</h2>
    <button id="close-btn" onclick="closeDrawer()">&#x2715;</button>
  </div>
  <div id="drawer-body">
    <div class="sec-label">Identity</div>
    <div class="fg"><label>Name</label><input id="s-name" type="text" placeholder="Full name" autocomplete="name"/></div>
    <div class="fg"><label>Agency</label><input id="s-agency" type="text" placeholder="e.g. TEMA"/></div>
    <div class="fg"><label>Region</label><input id="s-region" type="text" placeholder="e.g. West TN"/></div>
    <div class="fg"><label>Car Number</label><input id="s-car" type="text" placeholder="e.g. ESC-7"/></div>
    <div class="fg"><label>Assigned</label><input id="s-assigned" type="text" placeholder="Current assignment"/></div>
    <div class="fg"><label>Notes</label><textarea id="s-notes" placeholder="Mission notes…"></textarea></div>
    <div class="sec-label">Feature Service</div>
    <div class="fg"><label>FeatureServer Layer URL</label><input id="s-fsurl" type="url" placeholder="…/FeatureServer/0" inputmode="url"/></div>
    <div class="fg"><label>Token (if required)</label><input id="s-token" type="text" placeholder="ArcGIS token"/></div>
    <div class="sec-label">Tracking</div>
    <div class="fg"><label>Auto-submit interval (sec)</label><input id="s-interval" type="number" value="30" min="5" max="300" inputmode="numeric"/></div>
    <div class="fg"><label>Min distance filter (m)</label><input id="s-mindist" type="number" value="10" min="0" max="500" inputmode="numeric"/></div>
    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const DEFAULT_FS = 'https://services8.arcgis.com/hHiNEOyFVAr0vW21/arcgis/rest/services/service_0fc5bb1784aa47fa8c9a0e1b3bf6e425/FeatureServer/0';

let map, locMarker, accCircle, trackLine, watchId=null;
let isTracking=false, autoTimer=null;
let lastPos=null, trackCoords=[], trackPts=[];
let cfg={name:'',agency:'',region:'',car:'',assigned:'',notes:'',fsurl:DEFAULT_FS,token:'',interval:30,mindist:10};

// ── MAP ───────────────────────────────────────────────────
function initMap(){
  map=L.map('map',{zoomControl:true,tap:true}).setView([35.8,-86.4],7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19,detectRetina:true
  }).addTo(map);
  loadCfg();
  startWatch();
}

// ── GPS ───────────────────────────────────────────────────
function startWatch(){
  if(!navigator.geolocation){toast('Geolocation not supported','err');return}
  navigator.geolocation.watchPosition(onPos,onErr,{enableHighAccuracy:true,maximumAge:4000,timeout:15000});
}

function onPos(pos){
  lastPos=pos;
  const {latitude:lat,longitude:lng,accuracy:acc,altitude:alt,speed:spd,heading:hdg}=pos.coords;
  // banner
  const dot=document.getElementById('gps-dot');
  dot.className=acc<10?'good':acc<30?'ok':'bad';
  document.getElementById('banner-coords').textContent=`${lat.toFixed(6)},  ${lng.toFixed(6)}`;
  const accEl=document.getElementById('m-acc');
  accEl.textContent=`±${Math.round(acc)}m`;
  accEl.className=acc<10?'acc-good':acc<30?'acc-ok':'acc-bad';
  document.getElementById('m-alt').textContent=alt!=null?`${Math.round(alt)}m`:'—';
  document.getElementById('m-spd').textContent=spd!=null?`${(spd*2.237).toFixed(1)}mph`:'—';
  document.getElementById('m-hdg').textContent=hdg!=null?`${Math.round(hdg)}°`:'—';
  document.getElementById('m-time').textContent=new Date(pos.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  // marker
  if(!locMarker){
    const icon=L.divIcon({className:'',html:'<div style="position:relative"><div class="pulse-ring"></div><div class="my-dot"></div></div>',iconSize:[14,14],iconAnchor:[7,7]});
    locMarker=L.marker([lat,lng],{icon,zIndexOffset:1000}).addTo(map);
    accCircle=L.circle([lat,lng],{radius:acc,color:'#3b82f6',fillOpacity:.07,weight:1}).addTo(map);
    map.setView([lat,lng],14);
  } else {
    locMarker.setLatLng([lat,lng]);
    accCircle.setLatLng([lat,lng]);accCircle.setRadius(acc);
  }
  if(isTracking) addTrackPt(lat,lng,pos.timestamp);
}

function onErr(e){
  document.getElementById('banner-coords').textContent='GPS: '+e.message;
  document.getElementById('gps-dot').className='bad';
}

// ── SUBMIT ────────────────────────────────────────────────
async function submitLoc(){
  if(!lastPos){toast('No GPS fix yet','err');return}
  if(!cfg.fsurl){toast('No Feature Service URL set','err');openDrawer();return}
  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='…';
  setStatus('Submitting…');
  const {latitude:lat,longitude:lng,accuracy:acc,altitude:alt,speed:spd,heading:hdg}=lastPos.coords;
  const attr={
    name:cfg.name||'Unknown',
    car_number:cfg.car||null,
    agency:cfg.agency||null,
    region:cfg.region||null,
    assigned:cfg.assigned||null,
    notes:cfg.notes||null,
    photo:null,
    latitude:lat,
    longitude:lng,
    timestamp_utc:new Date(lastPos.timestamp).toISOString(),
    speed_mph:spd!=null?parseFloat((spd*2.237).toFixed(1)):null,
    heading:hdg!=null?Math.round(hdg):null
  };
  const ok=await postFeature(lat,lng,attr);
  btn.disabled=false;btn.textContent='Submit';
  if(ok){
    toast(`Submitted · ${lat.toFixed(5)}, ${lng.toFixed(5)}`);
    setStatus('Last submit: '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}));
    dropPin(lat,lng,attr);
  } else {
    toast('Submission failed — check console','err');
    setStatus('Submit failed');
  }
}

async function postFeature(lat,lng,attr){
  try{
    const feat={
      geometry:{x:lng,y:lat,spatialReference:{wkid:4326}},
      attributes:attr
    };
    const body=new URLSearchParams();
    body.append('features',JSON.stringify([feat]));
    body.append('rollbackOnFailure','true');
    body.append('f','json');
    if(cfg.token) body.append('token',cfg.token);
    const url=cfg.fsurl.replace(/\/$/,'')+'/addFeatures';
    console.log('[FS] POST →',url);
    console.log('[FS] Payload:',JSON.parse(body.get('features')));
    const r=await fetch(url,{method:'POST',body});
    const j=await r.json();
    console.log('[FS] Response:',j);
    if(j.error){console.error('[FS] Error:',j.error);return false}
    return j.addResults&&j.addResults[0]&&j.addResults[0].success===true;
  }catch(e){console.error('[FS] Exception:',e);return false}
}

function dropPin(lat,lng,attr){
  const icon=L.divIcon({className:'',html:'<div style="width:12px;height:12px;border-radius:50%;background:#22c55e;border:2px solid #fff;box-shadow:0 0 6px #22c55e88"></div>',iconSize:[12,12],iconAnchor:[6,6]});
  const t=new Date(attr.timestamp_utc).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  L.marker([lat,lng],{icon}).addTo(map)
   .bindPopup(`<b>${attr.name}</b>${attr.car_number?' · '+attr.car_number:''}<br>${attr.agency||''}<br>${lat.toFixed(5)}, ${lng.toFixed(5)}<br>${t}${attr.notes?'<br><i>'+attr.notes+'</i>':''}`);
}

// ── LIVE TRACKING ─────────────────────────────────────────
function toggleTrack(){
  isTracking=!isTracking;
  const btn=document.getElementById('track-btn');
  const info=document.getElementById('track-info');
  if(isTracking){
    btn.textContent='Stop';btn.classList.add('active');
    info.classList.add('vis');setStatus('Tracking ON');
    autoTimer=setInterval(()=>{if(lastPos)submitLoc()},cfg.interval*1000);
  }else{
    btn.textContent='Live Track';btn.classList.remove('active');
    clearInterval(autoTimer);autoTimer=null;
    info.classList.remove('vis');setStatus('Tracking OFF');
  }
}

function addTrackPt(lat,lng,ts){
  if(trackCoords.length){
    const[plat,plng]=trackCoords[trackCoords.length-1];
    if(haversine(plat,plng,lat,lng)<cfg.mindist) return;
  }
  trackCoords.push([lat,lng]);trackPts.push({lat,lng,ts});
  if(trackLine) map.removeLayer(trackLine);
  if(trackCoords.length>1)
    trackLine=L.polyline(trackCoords,{color:'#f59e0b',weight:3,opacity:.85,dashArray:'6,5'}).addTo(map);
  const mi=totalDist()/1609.34;
  document.getElementById('ti-pts').textContent=trackCoords.length+' pts';
  document.getElementById('ti-dist').textContent=mi.toFixed(1)+' mi';
}

function clearTrack(){
  trackCoords=[];trackPts=[];
  if(trackLine){map.removeLayer(trackLine);trackLine=null}
  document.getElementById('ti-pts').textContent='0 pts';
  document.getElementById('ti-dist').textContent='0.0 mi';
  setStatus('Track cleared');
}

function totalDist(){
  let d=0;
  for(let i=1;i<trackCoords.length;i++)
    d+=haversine(trackCoords[i-1][0],trackCoords[i-1][1],trackCoords[i][0],trackCoords[i][1]);
  return d;
}

function haversine(a,b,c,d){
  const R=6371000,r=Math.PI/180,dL=(c-a)*r,dN=(d-b)*r;
  const x=Math.sin(dL/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

// ── SETTINGS ─────────────────────────────────────────────
function openDrawer(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open')}
function closeDrawer(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open')}

function loadCfg(){
  try{const s=localStorage.getItem('ft2_cfg');if(s)cfg=Object.assign(cfg,JSON.parse(s))}catch(e){}
  document.getElementById('s-name').value=cfg.name;
  document.getElementById('s-agency').value=cfg.agency;
  document.getElementById('s-region').value=cfg.region;
  document.getElementById('s-car').value=cfg.car;
  document.getElementById('s-assigned').value=cfg.assigned;
  document.getElementById('s-notes').value=cfg.notes;
  document.getElementById('s-fsurl').value=cfg.fsurl;
  document.getElementById('s-token').value=cfg.token;
  document.getElementById('s-interval').value=cfg.interval;
  document.getElementById('s-mindist').value=cfg.mindist;
}

function saveSettings(){
  cfg.name=document.getElementById('s-name').value.trim();
  cfg.agency=document.getElementById('s-agency').value.trim();
  cfg.region=document.getElementById('s-region').value.trim();
  cfg.car=document.getElementById('s-car').value.trim();
  cfg.assigned=document.getElementById('s-assigned').value.trim();
  cfg.notes=document.getElementById('s-notes').value.trim();
  cfg.fsurl=document.getElementById('s-fsurl').value.trim().replace(/\/$/,'');
  cfg.token=document.getElementById('s-token').value.trim();
  cfg.interval=parseInt(document.getElementById('s-interval').value)||30;
  cfg.mindist=parseInt(document.getElementById('s-mindist').value)||10;
  try{localStorage.setItem('ft2_cfg',JSON.stringify(cfg))}catch(e){}
  closeDrawer();toast('Settings saved');
}

// ── UTILS ─────────────────────────────────────────────────
function centerMap(){if(lastPos)map.setView([lastPos.coords.latitude,lastPos.coords.longitude],16)}
function setStatus(m){document.getElementById('status-msg').textContent=m}
function toast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className=(type?type+' ':'')+'show';
  clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3500);
}

window.addEventListener('load',initMap);
window.addEventListener('resize',()=>map&&map.invalidateSize());
</script>
</body>
</html>
